version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: spring-security-step-by-step-mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: security_users
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: StrongPassword123!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
